# Server deploy settings for deploy-server.sh

# Build artifact base name:
# - dist-easy_publish_frontend.zip
# - dist-easy_publish_frontend-<version>.zip
ARTIFACT_BASE=dist-easy_publish_frontend

# Where temporary unzip folders are created
WORK_DIR_BASE=/tmp/easy_publish_deploy

# Keep unpacked build folder after script ends (1=true, 0=false)
KEEP_UNPACKED=0

# Number of old releases to keep per target
KEEP_RELEASES=5

# Target app directories (comma-separated)
TARGETS=/var/www/izipublish.com,/var/www/cars.izipublish.com

# Ownership and permissions for deployed files
OWNER_GROUP=www-data:www-data
DIR_MODE=755
FILE_MODE=644

# Copy shared assets from each target root into new release
COPY_IMAGES=1
COPY_HTACCESS=1
